{% extends 'plants/base.html' %}
{% load crispy_forms_tags %}
{% block content %}
  <div>
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition">
      {% if plant.image %}
        <div class="">
          <img src="{{ plant.image.url }}" alt="{{ plant.name }}" class="h-40 flex items-center justify-center" />
        </div>
      {% else %}
        <div class="h-40 bg-green-100 flex items-center justify-center">
          <i class="fa-solid fa-seedling text-5xl text-green-600"></i>
        </div>
      {% endif %}
      <div class="p-4">
        <div class="flex justify-between items-start">
          <h3 class="font-bold text-lg">{{ plant.name }}</h3>
          <span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full">Healthy</span>
        </div>
        <p class="text-sm text-gray-500 mt-1">Last watered: 2 hours ago</p>
        <div class="mt-4 flex gap-2">
          <button class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded-lg text-sm font-medium">Log Task</button>

          <div class="relative inline-block text-left dropdown-container">
            <button class="dropdown-toggle px-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg py-2"><i class="fa-solid fa-ellipsis"></i></button>

            <div class="dropdown-menu hidden absolute right-0 mt-2 w-48 rounded-md bg-white shadow-lg ring-1 ring-gray-500 z-50">
              <div class="py-1">
                <a href="{% url 'plants:plant_update' plant.id %}" class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"><i class="fa-solid fa-pen-to-square mr-3 w-4"></i> Edit</a>
                <a href="{% url 'plants:plant_delete' plant.id %}" onclick="return confirm('Are you sure you want to delete this?')" class="flex items-center px-4 py-2 text-sm text-red-600 hover:bg-red-50"><i class="fa-solid fa-trash mr-3 w-4"></i> Delete</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    // Select all dropdown containers
    const containers = document.querySelectorAll('.dropdown-container')
    
    containers.forEach((container) => {
      const btn = container.querySelector('.dropdown-toggle')
      const menu = container.querySelector('.dropdown-menu')
    
      btn.addEventListener('click', (e) => {
        e.stopPropagation()
    
        // Close all OTHER open menus first (optional, but feels cleaner)
        document.querySelectorAll('.dropdown-menu').forEach((m) => {
          if (m !== menu) m.classList.add('hidden')
        })
    
        // Toggle the current menu
        menu.classList.toggle('hidden')
      })
    })
    
    // Close everything if clicking outside
    window.addEventListener('click', () => {
      document.querySelectorAll('.dropdown-menu').forEach((m) => m.classList.add('hidden'))
    })
  </script>
{% endblock %}
