<header class="sticky top-0 z-50 bg-yellow-800 border-b border-yellow-900 shadow-md">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 items-center justify-between">
      
      <a href="{% url 'plants:home' %}" class="flex items-center gap-2 group">
        <div class="flex h-10 w-10 items-center justify-center rounded-full bg-yellow-900/80 transition-transform group-hover:scale-110">
          <i class="fa-solid fa-leaf text-lime-400 text-xl"></i>
        </div>
        <span class="font-serif text-xl font-bold text-white tracking-tight">
          Plant Memo
        </span>
      </a>

      <div class="hidden md:flex items-center gap-6">
        {% if user.is_authenticated %}
          <nav class="flex items-center gap-6 mr-4">
            <a href="{% url 'plants:home' %}" class="text-sm font-medium text-yellow-100 hover:text-white transition-colors">Dashboard</a>
            <a href="#" class="text-sm font-medium text-yellow-100 hover:text-white transition-colors">Calendar</a>
          </nav>

          <div class="flex items-center gap-4 pl-6 border-l border-yellow-700/50">
            <span class="text-xs font-semibold text-yellow-200 uppercase tracking-wider">
              {{ user.username }}
            </span>
            <form action="{% url 'users:logout' %}" method="post" class="inline">
              {% csrf_token %}
              <button type="submit" class="cursor-pointer bg-red-600 hover:bg-red-700 text-white py-1.5 px-4 rounded-full text-xs font-bold border-b-4 border-red-800 transition-all active:border-b-0 active:translate-y-1">
                Logout
              </button>
            </form>
          </div>
        {% else %}
          <a href="{% url 'users:signin' %}" class="text-sm font-bold text-white hover:text-lime-400 transition-colors">Sign In</a>
          <a href="{% url 'users:signup' %}" class="bg-green-600 hover:bg-green-700 text-white py-2 px-6 rounded-full font-bold border-b-4 border-green-800 transition-all active:border-b-0 active:translate-y-1">
            Get Started
          </a>
        {% endif %}
      </div>

      <button id="mobile-menu-btn" class="md:hidden p-2 text-yellow-100 hover:text-white focus:outline-none">
        <i class="fa-solid fa-bars text-2xl" id="menu-icon"></i>
      </button>
    </div>

    <div id="mobile-menu" class="hidden md:hidden pb-6 pt-2 border-t border-yellow-700/50">
      <nav class="flex flex-col gap-4">
        {% if user.is_authenticated %}
          <a href="{% url 'plants:home' %}" class="text-yellow-100 font-medium px-2">Dashboard</a>
          <a href="#" class="text-yellow-100 font-medium px-2">Calendar</a>
          <hr class="border-yellow-700/50">
          <form action="{% url 'users:logout' %}" method="post">
            {% csrf_token %}
            <button type="submit" class="w-full text-left text-red-300 font-bold px-2 uppercase text-xs tracking-widest">
              Logout ({{ user.username }})
            </button>
          </form>
        {% else %}
          <a href="{% url 'users:signin' %}" class="text-yellow-100 font-medium px-2">Sign In</a>
          <a href="{% url 'users:signup' %}" class="bg-green-600 text-white py-3 px-4 rounded-xl font-bold text-center">Get Started</a>
        {% endif %}
      </nav>
    </div>
  </div>
</header>
