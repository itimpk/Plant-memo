{% extends 'plants/base.html' %}
{% block content %}
  <div>
    <a href="{% url 'plants:group_create' %}" class="text-sm text-primary hover:text-primary/80 transition-colors bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-full">Add Group</a>
    <a href="{% url 'plants:plant_create' %}" class="text-sm bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-full">Add Plant</a>
    {% for group in groups %}
      <h3>{{ group.name }}</h3>
<div class="relative inline-block text-left dropdown-container">
            <button class="dropdown-toggle px-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg py-2"><i class="fa-solid fa-ellipsis"></i></button>

            <div class="dropdown-menu hidden absolute right-0 mt-2 w-48 rounded-md bg-white shadow-lg ring-1 ring-gray-500 z-50">
              <div class="py-1">
                <a href="{% url 'plants:group_update' group.id %}" class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"><i class="fa-solid fa-pen-to-square mr-3 w-4"></i> Edit</a>
                <a href="{% url 'plants:group_delete' group.id %}" onclick="return confirm('Are you sure you want to delete this?')" class="flex items-center px-4 py-2 text-sm text-red-600 hover:bg-red-50"><i class="fa-solid fa-trash mr-3 w-4"></i> Delete</a>
              </div>
            </div>
          </div>
      {% for plant in plants %}
        {% if plant.group == group %}
          <div>
            <a href="{% url 'plants:plant_detail' plant.id %}">{{ plant.name }}</a>
            {% if plant.image %}
              <img src="{{ plant.image.url }}" alt="{{ plant.name }}" />
            {% endif %}
          </div>
        {% endif %}
      {% endfor %}
    {% endfor %}
  </div>



<script>
    // Select all dropdown containers
    const containers = document.querySelectorAll('.dropdown-container')
    
    containers.forEach((container) => {
      const btn = container.querySelector('.dropdown-toggle')
      const menu = container.querySelector('.dropdown-menu')
    
      btn.addEventListener('click', (e) => {
        e.stopPropagation()
    
        // Close all OTHER open menus first (optional, but feels cleaner)
        document.querySelectorAll('.dropdown-menu').forEach((m) => {
          if (m !== menu) m.classList.add('hidden')
        })
    
        // Toggle the current menu
        menu.classList.toggle('hidden')
      })
    })
    
    // Close everything if clicking outside
    window.addEventListener('click', () => {
      document.querySelectorAll('.dropdown-menu').forEach((m) => m.classList.add('hidden'))
    })
  </script>

{% endblock %}
