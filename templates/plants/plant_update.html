{% extends 'plants/base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div>
    <form method="POST" action="{% url 'plants:plant_update' plant.id %}" enctype="multipart/form-data">
            {% csrf_token %}  
            {{ form | crispy }}
            <button type="submit" class="">Update</button>
        </form>
</div>
{% endblock %}
